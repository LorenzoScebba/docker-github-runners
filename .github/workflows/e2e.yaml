name: e2e

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - name: Build (amd64, load)
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          platforms: linux/amd64
          build-args: |
            INSTALL_CONTAINER_TOOLS=false
          tags: hardened-runner:e2e

      - name: Scan with grype
        uses: anchore/scan-action@v7
        id: grype
        continue-on-error: true
        with:
          image: hardened-runner:e2e
          fail-build: true
          severity-cutoff: critical
          only-fixed: true
          output-format: table

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ${{ steps.grype.outputs.sarif }}

      - name: Post scan result as PR comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const outcome = '${{ steps.grype.outcome }}';
            const icon = outcome === 'failure' ? '❌' : '✅';
            const status = outcome === 'failure'
              ? 'Fixable **critical** CVEs found — see the Security tab for details.'
              : 'No fixable critical CVEs found.';
            const body = `## ${icon} grype scan\n\n${status}\n\n` +
              `_Scan ran on \`linux/amd64\` with \`severity-cutoff: critical\` and \`only-fixed: true\`. ` +
              `Ignored rules from \`.grype.yaml\` apply._`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Start container (override entrypoint, skip registration)
        run: |
          docker run -d --name runner-e2e \
            --entrypoint sleep \
            -v /var/run/docker.sock:/var/run/docker.sock \
            hardened-runner:e2e infinity

      - name: Check tool availability
        run: |
          set -e
          for check in \
            "aws --version" \
            "helm version" \
            "gh --version" \
            "docker --version" \
            "yq --version" \
            "make --version" \
            "yarn --version" \
            "chrome --version" \
            "crane version"; do
            echo "::group::${check}"
            docker exec runner-e2e sh -c "${check}"
            echo "::endgroup::"
          done

      - name: Check container execution (container.image equivalent)
        run: docker exec runner-e2e docker run --rm alpine:3.20 echo "container execution ok"

      - name: Clean up
        if: always()
        run: docker rm -f runner-e2e || true

      - name: Fail if grype found fixable critical CVEs
        if: steps.grype.outcome == 'failure'
        run: |
          echo "::error::grype scan found fixable critical CVEs — see the Security tab for details"
          exit 1