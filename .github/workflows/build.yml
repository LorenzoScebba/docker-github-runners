name: build

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute version and tags
        id: meta
        run: |
          ver="$(grep -oP 'ARG GH_RUNNER_VERSION="\K[^"]+' Dockerfile)"
          [[ -n "$ver" ]] || { echo "::error::could not read GH_RUNNER_VERSION from Dockerfile"; exit 1; }
          image="ghcr.io/${{ github.repository }}"
          image="${image,,}"
          echo "tags=${image}:${ver}-ubuntu-noble,${image}:ubuntu-noble" >> "$GITHUB_OUTPUT"
          echo "scan_tag=${image}:scan-${{ github.sha }}" >> "$GITHUB_OUTPUT"

      # Build amd64 locally first so we can scan it before publishing.
      - name: Build (amd64, load for scan)
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          platforms: linux/amd64
          build-args: |
            INSTALL_CONTAINER_TOOLS=false
          tags: ${{ steps.meta.outputs.scan_tag }}

      - name: Scan with grype (distinct CVEs)
        uses: anchore/scan-action@v7
        id: grype
        with:
          image: ${{ steps.meta.outputs.scan_tag }}
          fail-build: true
          severity-cutoff: critical
          only-fixed: true

      - name: Inspect action SARIF report
        run: cat ${{ steps.grype.outputs.sarif }}

      - name: upload Anchore scan SARIF report
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ${{ steps.grype.outputs.sarif }}

      - name: Push multi-arch image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            INSTALL_CONTAINER_TOOLS=false
          tags: ${{ steps.meta.outputs.tags }}
