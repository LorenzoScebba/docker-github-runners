name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:
    inputs:
      runner_version:
        description: GitHub Actions runner version
        required: false
        default: "2.335.1"

permissions:
  contents: read
  packages: write

env:
  GH_RUNNER_VERSION: ${{ github.event.inputs.runner_version || '2.335.1' }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        run: |
          # Docker requires lowercase image refs; github.repository may have uppercase.
          image="ghcr.io/${{ github.repository }}"
          image="${image,,}"
          ver="${GH_RUNNER_VERSION}"
          echo "tags=${image}:${ver}-ubuntu-noble,${image}:ubuntu-noble" >> "$GITHUB_OUTPUT"
          echo "scan_tag=${image}:scan-${{ github.sha }}" >> "$GITHUB_OUTPUT"

      # Build amd64 locally first so we can scan it before publishing.
      - name: Build (amd64, load for scan)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          platforms: linux/amd64
          build-args: |
            GH_RUNNER_VERSION=${{ env.GH_RUNNER_VERSION }}
            INSTALL_CONTAINER_TOOLS=false
          tags: ${{ steps.meta.outputs.scan_tag }}

      - name: Scan with grype (distinct CVEs)
        uses: anchore/scan-action@v6
        id: grype
        with:
          image: ${{ steps.meta.outputs.scan_tag }}
          fail-build: false
          output-format: json
          output-file: scan.json

      - name: Gate on the targeted Critical cluster
        run: |
          echo "Distinct Critical CVEs:"
          jq -r '[.matches[]|select(.vulnerability.severity=="Critical")|.vulnerability.id]|unique|.[]' scan.json
          echo "Distinct High CVEs:"
          jq -r '[.matches[]|select(.vulnerability.severity=="High")|.vulnerability.id]|unique|.[]' scan.json
          # These must NOT reappear — they are the snapd/podman/CNI Go-stdlib cluster.
          forbidden="CVE-2024-24790 CVE-2025-22871 GHSA-p77j-4mvh-x3m3"
          found=""
          for cve in $forbidden; do
            if jq -e --arg c "$cve" 'any(.matches[]; .vulnerability.id==$c)' scan.json >/dev/null; then
              found="$found $cve"
            fi
          done
          if [[ -n "$found" ]]; then
            echo "::error::Hardening regression — forbidden CVEs present:$found"
            exit 1
          fi
          echo "OK: targeted Go-stdlib cluster is absent."

      - name: Push multi-arch image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            GH_RUNNER_VERSION=${{ env.GH_RUNNER_VERSION }}
            INSTALL_CONTAINER_TOOLS=false
          tags: ${{ steps.meta.outputs.tags }}
