name: build-pr

on:
  pull_request:
    branches: [master]

permissions:
  contents: read
  pull-requests: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - name: Build (amd64, load for scan)
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          platforms: linux/amd64
          build-args: |
            INSTALL_CONTAINER_TOOLS=false
          tags: hardened-runner:pr-${{ github.event.pull_request.number }}

      - name: Scan with grype
        uses: anchore/scan-action@v7
        id: grype
        continue-on-error: true
        with:
          image: hardened-runner:pr-${{ github.event.pull_request.number }}
          fail-build: true
          severity-cutoff: critical
          only-fixed: true
          output-format: table

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ${{ steps.grype.outputs.sarif }}

      - name: Post scan result as PR comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const outcome = '${{ steps.grype.outcome }}';
            const icon = outcome === 'failure' ? '❌' : '✅';
            const status = outcome === 'failure'
              ? 'Fixable **critical** CVEs found — see the Security tab for details.'
              : 'No fixable critical CVEs found.';
            const body = `## ${icon} grype scan\n\n${status}\n\n` +
              `_Scan ran on \`linux/amd64\` with \`severity-cutoff: critical\` and \`only-fixed: true\`. ` +
              `Ignored rules from \`.grype.yaml\` apply._`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Fail if grype found fixable critical CVEs
        if: steps.grype.outcome == 'failure'
        run: |
          echo "::error::grype scan found fixable critical CVEs — see the Security tab for details"
          exit 1
